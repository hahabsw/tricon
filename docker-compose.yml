services:
  colyseus:
    build:
      context: .
      dockerfile: docker/colyseus.Dockerfile
    restart: unless-stopped
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
      TRICON_DB_PATH: /app/data/tricon.db
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
        NEXT_PUBLIC_COLYSEUS_URL: "ws://localhost:2567"
    environment:
      COLYSEUS_INTERNAL_URL: "ws://colyseus:2567"
      TRICON_DB_PATH: /app/data/tricon.db
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      colyseus:
        condition: service_started
