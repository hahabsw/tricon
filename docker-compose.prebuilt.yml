services:
  web:
    build:
      context: .
      dockerfile: docker/web.prebuilt.Dockerfile
    environment:
      COLYSEUS_INTERNAL_URL: "ws://colyseus:2567"
    restart: always
    ports:
      - "3100:3000"
    depends_on:
      colyseus:
        condition: service_started

  colyseus:
    build:
      context: .
      dockerfile: docker/colyseus.prebuilt.Dockerfile
    restart: always
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
