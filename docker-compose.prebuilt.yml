services:
  data-init:
    image: busybox:1.36
    command: sh -c "mkdir -p /data && chown -R 1001:1001 /data"
    user: "0"
    volumes:
      - ./data:/data

  web:
    build:
      context: .
      dockerfile: docker/web.prebuilt.Dockerfile
    environment:
      COLYSEUS_INTERNAL_URL: "ws://colyseus:2567"
      TRICON_DB_PATH: /app/data/tricon.db
    restart: always
    ports:
      - "3100:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      colyseus:
        condition: service_started
      data-init:
        condition: service_completed_successfully

  colyseus:
    build:
      context: .
      dockerfile: docker/colyseus.prebuilt.Dockerfile
    restart: always
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
      TRICON_DB_PATH: /app/data/tricon.db
    volumes:
      - ./data:/app/data
    depends_on:
      data-init:
        condition: service_completed_successfully
