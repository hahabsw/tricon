<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  
  <rect width="320" height="240" fill="#050510"></rect>
  <defs>
    <radialGradient id="td-star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="40%" stop-color="#A5F3FC" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="td-claim" x1="0" y1="0" x2="200" y2="120">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#3DFFB3" stop-opacity="0.18"></stop>
    </linearGradient>
  </defs>

  
  <polygon points="80,160 200,180 140,100" fill="url(#td-claim)" stroke="#00FFFF" stroke-width="1.5" opacity="0.9"></polygon>

  
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round">
    <line x1="140" y1="100" x2="240" y2="60"></line>
    <line x1="240" y1="60" x2="200" y2="180"></line>
    <line x1="80" y1="160" x2="60" y2="60"></line>
    <line x1="60" y1="60" x2="140" y2="100"></line>
  </g>

  
  <g>
    <circle cx="60" cy="60" r="9" fill="url(#td-star)"></circle>
    <circle cx="140" cy="100" r="9" fill="url(#td-star)"></circle>
    <circle cx="240" cy="60" r="9" fill="url(#td-star)"></circle>
    <circle cx="80" cy="160" r="9" fill="url(#td-star)"></circle>
    <circle cx="200" cy="180" r="9" fill="url(#td-star)"></circle>
    <circle cx="280" cy="190" r="9" fill="url(#td-star)"></circle>
  </g>
  <g fill="#ffffff">
    <circle cx="60" cy="60" r="2.5"></circle>
    <circle cx="140" cy="100" r="2.5"></circle>
    <circle cx="240" cy="60" r="2.5"></circle>
    <circle cx="80" cy="160" r="2.5"></circle>
    <circle cx="200" cy="180" r="2.5"></circle>
    <circle cx="280" cy="190" r="2.5"></circle>
  </g>
</svg>