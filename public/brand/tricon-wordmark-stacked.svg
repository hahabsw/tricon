<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <defs>
    <radialGradient id="sw-star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="40%" stop-color="#A5F3FC" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="sw-tri-fill" x1="0" y1="0" x2="160" y2="160">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.22"></stop>
      <stop offset="50%" stop-color="#3DFFB3" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#FF3FE0" stop-opacity="0.22"></stop>
    </linearGradient>
    <linearGradient id="sw-edge-stroke" x1="0" y1="0" x2="160" y2="160">
      <stop offset="0%" stop-color="#00FFFF"></stop>
      <stop offset="50%" stop-color="#3DFFB3"></stop>
      <stop offset="100%" stop-color="#FF3FE0"></stop>
    </linearGradient>
  </defs>

  <g transform="translate(30,20)">
    <polygon points="80,8 152,140 8,140" fill="url(#sw-tri-fill)"></polygon>
    <g stroke="url(#sw-edge-stroke)" stroke-width="4" stroke-linecap="round">
      <line x1="80" y1="8" x2="152" y2="140"></line>
      <line x1="152" y1="140" x2="8" y2="140"></line>
      <line x1="8" y1="140" x2="80" y2="8"></line>
    </g>
    <circle cx="80" cy="8" r="22" fill="url(#sw-star-glow)"></circle>
    <circle cx="152" cy="140" r="22" fill="url(#sw-star-glow)"></circle>
    <circle cx="8" cy="140" r="22" fill="url(#sw-star-glow)"></circle>
    <circle cx="80" cy="8" r="6" fill="#ffffff"></circle>
    <circle cx="152" cy="140" r="6" fill="#ffffff"></circle>
    <circle cx="8" cy="140" r="6" fill="#ffffff"></circle>
  </g>

  <text x="110" y="200" text-anchor="middle" font-family="&#39;Space Grotesk&#39;, system-ui, sans-serif" font-weight="700" font-size="32" letter-spacing="2" fill="#ffffff">TRICON</text>
</svg>